name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod
        run: ./gradlew build --stacktrace

      - name: Upload built mod
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vivarium-libera-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
